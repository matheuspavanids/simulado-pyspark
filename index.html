correct: 2,
explanation: “Delta Lake implementa ACID via optimistic concurrency: cada operação tenta commit atômico no _delta_log (arquivo JSON numerado sequencialmente). No commit, verifica se os arquivos que leu/modificou foram alterados por outra transação. INSERT vs UPDATE em dados diferentes geralmente não conflita (isolation level padrão = Serializable para writes). Se conflitar, o commit falha e o pipeline deve retry. Isso é fundamentalmente diferente de databases tradicionais que usam locks.”
